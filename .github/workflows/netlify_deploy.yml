name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install yfinance pandas

      # 4️⃣ Run Macro Tracker and log errors
      - name: Run Macro Tracker
        run: |
          echo "Running macro_tracker.py..."
          python3 macro_tracker.py || python macro_tracker.py || { echo 'Python script failed!'; exit 1; }

      # 5️⃣ Debug: list dashboard_build folder
      - name: Verify dashboard_build
        run: |
          echo "Checking dashboard_build contents..."
          ls -R dashboard_build || { echo 'dashboard_build missing!'; exit 1; }

      # 6️⃣ Deploy to Netlify (only if folder exists)
      - name: Deploy to Netlify
        if: ${{ success() }}
        uses: nwtgck/actions-netlify@v1.2.0
        with:
          publish-dir: dashboard_build
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          site-id: ${{ secrets.NETLIFY_SITE_ID }}

name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Macro Tracker
        # run the Python script; python3 on GH runners is safe
        run: python3 macro_tracker.py || python macro_tracker.py

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: macro-dashboard
          path: dashboard_build/index.html

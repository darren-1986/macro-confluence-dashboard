name: Update Macro Dashboard

# Run every 4 hours, plus manual trigger
on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests beautifulsoup4 pandas

      # 4️⃣ Run your macro_tracker.py script
      - name: Run Macro Tracker
        run: python macro_tracker.py

      # 5️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages            # branch for Pages
          folder: ./                  # deploy root folder (index.html in repo root)
          clean: true                 # remove old files
          commit-message: "Auto-update Macro Dashboard"
          token: ${{ secrets.GITHUB_TOKEN }}

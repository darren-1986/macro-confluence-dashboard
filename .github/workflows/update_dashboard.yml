name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Macro Tracker
        run: python3 macro_tracker.py || python macro_tracker.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_build/index.html
          if ! git diff --cached --quiet; then
              git commit -m "Auto-update Macro Dashboard"
              git push
          else
              echo "No changes to commit"

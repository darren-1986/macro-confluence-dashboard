name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Macro Tracker
        run: python3 macro_tracker.py || python macro_tracker.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macro-dashboard
          path: dashboard_build/index.html

name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours
  workflow_dispatch:          # allows manual trigger

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install Python dependencies
        run: |
          pip install yfinance pandas
          pip install fredapi || echo "fredapi not installed, skipping"

      # 4️⃣ Run macro tracker script
      - name: Run Macro Tracker
        run: python macro_tracker.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # 5️⃣ Commit & push updated dashboard
      - name: Commit & push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_build/index.html
          git commit -m "Auto-update Macro Dashboard" || echo "No changes to commit"
          git push

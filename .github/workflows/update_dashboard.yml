name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Macro Tracker
        run: python3 macro_tracker.py || python macro_tracker.py

      - name: Commit & Push Dashboard
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update Macro Dashboard"
          branch: main
          file_pattern: dashboard_build/index.html
          github_token: ${{ secrets.GITHUB_TOKEN }}

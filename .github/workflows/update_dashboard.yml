name: Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"    # Every 4 hours
  workflow_dispatch:          # Allows manual run

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests beautifulsoup4

      # 4️⃣ Generate the dashboard
      - name: Run dashboard script
        run: python macro_dashboard.py

      # 5️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages           # Branch to deploy to (will be created if missing)
          folder: ./                 # Deploy root contains index.html
          clean: true
          commit-message: "Update dashboard"
          target-folder: "/"         # Deploy content to root
          token: ${{ secrets.GITHUB_TOKEN }}

name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas fredapi

      - name: Run Macro Tracker
        run: python macro_tracker.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_build/index.html
          git commit -m "Auto-update Macro Dashboard" || echo "No changes"
          git push
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

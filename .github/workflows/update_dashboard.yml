name: Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance

      - name: Run Macro Tracker
        run: python macro_tracker.py

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dashboard_build/index.html
          git commit -m "Auto-update Macro Dashboard" || echo "No changes to commit"
          git push

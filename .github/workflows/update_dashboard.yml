name: Auto Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run Macro Tracker
        run: python3 macro_tracker.py || python macro_tracker.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages       # this branch will host the site
          folder: dashboard_build # folder containing index.html
          commit-message: "Auto-update Macro Dashboard"
          clean: true

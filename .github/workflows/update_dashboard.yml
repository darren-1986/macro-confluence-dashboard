name: Update Macro Dashboard

on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests beautifulsoup4

      - name: Run Macro Tracker
        run: python macro_tracker.py

      - name: Initialize gh-pages if missing
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initial gh-pages commit"
            git push origin gh-pages
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dashboard_build
          commit-message: "Auto-update Macro Dashboard"
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          force: true
